<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CorvusDossiers — Visor</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --text: #c8c8d4;
            --text-muted: #6c6c80;
            --accent: #7c5cbf;
            --accent-dim: #5a3d8f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.6rem 1.25rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .toolbar a {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: color 0.2s;
        }
        .toolbar a:hover { color: #a07ee8; }
        .toolbar .title {
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        .toolbar .download-btn {
            padding: 0.35rem 0.75rem;
            background: var(--accent-dim);
            color: #e0e0e8;
            border-radius: 4px;
            font-size: 0.8rem;
            text-decoration: none;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .toolbar .download-btn:hover { background: var(--accent); color: #fff; }
        .viewer {
            flex: 1;
            display: flex;
        }
        .viewer iframe, .viewer embed {
            width: 100%;
            height: 100%;
            border: none;
        }
        .fallback {
            display: none;
            flex: 1;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 1.5rem;
            padding: 2rem;
            text-align: center;
        }
        .fallback p { color: var(--text-muted); }
        .fallback .download-link {
            padding: 0.75rem 1.5rem;
            background: var(--accent-dim);
            color: #e0e0e8;
            border-radius: 6px;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.2s;
        }
        .fallback .download-link:hover { background: var(--accent); color: #fff; }
    </style>
</head>
<body>
    <div class="toolbar">
        <a href="../index.html">&larr; Volver</a>
        <span class="title" id="doc-title"></span>
        <a class="download-btn" id="download-link" download>Descargar PDF</a>
    </div>
    <div class="viewer" id="viewer"></div>
    <div class="fallback" id="fallback">
        <p>Tu navegador no soporta la vista previa de PDF.</p>
        <a class="download-link" id="fallback-link" download>Descargar PDF</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        const title = params.get('title') || (file ? file.replace(/\.pdf$/i, '').replace(/[-_]/g, ' ') : '');

        document.getElementById('doc-title').textContent = title;
        document.title = 'CorvusDossiers — ' + title;

        if (file) {
            const safeName = file.replace(/[^a-zA-Z0-9._\-]/g, '');
            document.getElementById('download-link').href = safeName;
            document.getElementById('fallback-link').href = safeName;

            const iframe = document.createElement('iframe');
            iframe.src = safeName;
            iframe.title = title;
            document.getElementById('viewer').appendChild(iframe);

            // Fallback: if iframe fails to render PDF (some mobile browsers)
            iframe.addEventListener('error', function() {
                document.getElementById('viewer').style.display = 'none';
                document.getElementById('fallback').style.display = 'flex';
            });
        }
    </script>
</body>
</html>
